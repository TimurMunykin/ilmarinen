services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${APP_SUBDOMAIN:-app}
      POSTGRES_PASSWORD: ${APP_SUBDOMAIN:-app}
      POSTGRES_DB: ${APP_SUBDOMAIN:-app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_SUBDOMAIN:-app}"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      target: prod
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/app}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "bunx prisma migrate deploy && node dist/main.js"

  web:
    build:
      context: ./apps/web
      target: prod
    depends_on:
      - api

volumes:
  pgdata:
