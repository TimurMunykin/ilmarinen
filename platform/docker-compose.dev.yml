services:
  postgres:
    ports:
      - "5432:5432"

  api:
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/prisma:/app/prisma
    ports:
      - "3001:3001"

  web:
    volumes:
      - ./apps/web/src:/app/src
    ports:
      - "5173:5173"

  caddy:
    image: caddy:2-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - api
      - web
